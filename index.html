<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日任务看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --todo: #ff6b6b;
            --in-progress: #feca57;
            --review: #48dbfb;
            --done: #1dd1a1;
            --high: #ff4757;
            --medium: #ffa502;
            --low: #2ed573;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header .date {
            font-size: 1.2rem;
            opacity: 0.95;
        }

        .header-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .header-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.18);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #666;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .stat-card.total .stat-number { background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card.todo .stat-number { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card.in-progress .stat-number { background: linear-gradient(135deg, #feca57, #f39c12); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card.done .stat-number { background: linear-gradient(135deg, #1dd1a1, #10ac84); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        @media (max-width: 900px) {
            .input-section {
                grid-template-columns: 1fr;
            }
        }

        .add-task {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        .add-task h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.2rem;
        }

        .add-task input, .add-task textarea, .add-task select {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 12px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .add-task input:focus, .add-task textarea:focus, .add-task select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .add-task textarea {
            min-height: 80px;
            resize: vertical;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .add-task button {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .add-task button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .template-manager {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            max-height: 400px;
            overflow-y: auto;
        }

        .template-manager h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .template-header-actions {
            display: flex;
            gap: 8px;
        }

        .template-btn {
            background: linear-gradient(135deg, #1dd1a1, #10ac84);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .template-btn.batch {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .template-btn.batch.active {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }

        .template-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(29, 209, 161, 0.4);
        }

        .batch-actions {
            display: none;
            margin-bottom: 15px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-radius: 10px;
            border: 2px dashed var(--primary);
        }

        .batch-actions.show {
            display: block;
        }

        .batch-actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .batch-count {
            font-size: 0.95rem;
            color: #333;
            font-weight: 600;
        }

        .batch-add-btn {
            background: linear-gradient(135deg, #1dd1a1, #10ac84);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .batch-add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(29, 209, 161, 0.4);
        }

        .batch-add-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .template-category {
            margin-bottom: 15px;
        }

        .category-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            padding-left: 8px;
            border-left: 3px solid var(--primary);
        }

        .template-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .template-item:hover {
            background: #e9ecef;
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .template-item.selected {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
            border-color: var(--primary);
        }

        .template-checkbox {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .template-checkbox-wrapper {
            display: none;
        }

        .template-checkbox-wrapper.show {
            display: block;
        }

        .template-icon {
            font-size: 1.5rem;
            margin-right: 12px;
        }

        .template-info {
            flex: 1;
        }

        .template-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .template-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 10px;
        }

        .template-desc {
            font-size: 0.85rem;
            color: #888;
        }

        .template-actions {
            display: flex;
            gap: 5px;
        }

        .template-action-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .template-action-btn.edit {
            background: #feca57;
            color: white;
        }

        .template-action-btn.delete {
            background: #ff6b6b;
            color: white;
        }

        .template-action-btn:hover {
            transform: scale(1.1);
        }

        .kanban {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        .column {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            min-height: 500px;
            transition: transform 0.3s ease;
        }

        .column:hover {
            transform: translateY(-3px);
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid;
        }

        .column-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .column-icon {
            font-size: 1.8rem;
        }

        .task-count {
            background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
        }

        .column.todo .column-header { border-color: var(--todo); }
        .column.todo .column-title { color: var(--todo); }
        .column.in-progress .column-header { border-color: var(--in-progress); }
        .column.in-progress .column-title { color: var(--in-progress); }
        .column.review .column-header { border-color: var(--review); }
        .column.review .column-title { color: var(--review); }
        .column.done .column-header { border-color: var(--done); }
        .column.done .column-title { color: var(--done); }

        .task-card {
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 14px;
            border-left: 5px solid;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .task-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .task-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        .task-card:hover::before {
            opacity: 1;
        }

        .task-card.todo { border-color: var(--todo); }
        .task-card.in-progress { border-color: var(--in-progress); }
        .task-card.review { border-color: var(--review); }
        .task-card.done { border-color: var(--done); }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .task-title {
            font-weight: 700;
            font-size: 1.05rem;
            color: #2d3436;
            flex: 1;
        }

        .priority-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .priority-high { background: var(--high); color: white; }
        .priority-medium { background: var(--medium); color: white; }
        .priority-low { background: var(--low); color: white; }

        .task-category {
            display: inline-block;
            padding: 4px 10px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 0.75rem;
            color: #666;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .task-content {
            color: #636e72;
            font-size: 0.9rem;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .task-meta-item {
            font-size: 0.8rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e8e8e8;
        }

        .task-actions button {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-next {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }

        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #333;
            font-size: 1.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #888;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #333;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .file-input-btn {
            background: linear-gradient(135deg, #1dd1a1, #10ac84);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .file-input-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 209, 161, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #aaa;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .sub-task-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #e8e8e8;
        }

        .sub-task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .sub-task-title {
            font-weight: 600;
            color: #333;
        }

        .btn-remove-subtask {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .btn-add-subtask {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 10px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 每日任务看板</h1>
            <div class="date" id="currentDate"></div>
            <div class="header-actions">
                <button class="header-btn" onclick="exportData()">💾 导出数据</button>
                <button class="header-btn" onclick="showImportModal()">📂 导入数据</button>
                <button class="header-btn" onclick="showTemplateModal()">⚙️ 管理模板</button>
                <button class="header-btn" style="background: linear-gradient(135deg, #ff6b6b, #ee5a5a);" onclick="clearAllTasks()">🗑️ 清空任务</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card total">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">总任务</div>
            </div>
            <div class="stat-card todo">
                <div class="stat-number" id="todoCount">0</div>
                <div class="stat-label">待处理</div>
            </div>
            <div class="stat-card in-progress">
                <div class="stat-number" id="progressCount">0</div>
                <div class="stat-label">进行中</div>
            </div>
            <div class="stat-card done">
                <div class="stat-number" id="doneCount">0</div>
                <div class="stat-label">已完成</div>
            </div>
        </div>

        <div class="input-section">
            <div class="add-task">
                <h3>➕ 添加新任务</h3>
                <input type="text" id="taskTitle" placeholder="任务标题" />
                <textarea id="taskContent" placeholder="任务内容描述..."></textarea>
                <div class="input-row">
                    <select id="taskPriority">
                        <option value="low">优先级：低</option>
                        <option value="medium" selected>优先级：中</option>
                        <option value="high">优先级：高</option>
                    </select>
                    <select id="taskCategory">
                        <option value="工作">工作</option>
                        <option value="学习">学习</option>
                        <option value="生活">生活</option>
                        <option value="健康">健康</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <button onclick="addTask()">✅ 创建任务</button>
            </div>

            <div class="template-manager">
                <h3>
                    📑 快速模板
                    <div class="template-header-actions">
                        <button class="template-btn batch" id="batchModeBtn" onclick="toggleBatchMode()">☑️ 批量选择</button>
                        <button class="template-btn" onclick="showTemplateModal()">+ 管理</button>
                    </div>
                </h3>
                <div class="batch-actions" id="batchActions">
                    <div class="batch-actions-row">
                        <span class="batch-count" id="selectedCount">已选 0 个模板</span>
                        <div style="display: flex; gap: 8px;">
                            <button class="template-btn" style="padding: 8px 12px; font-size: 0.8rem;" onclick="selectAllTemplates()">📋 全选</button>
                            <button class="batch-add-btn" id="batchAddBtn" onclick="addSelectedTemplates()" disabled>✅ 添加选中任务</button>
                        </div>
                    </div>
                </div>
                <div id="templateList"></div>
            </div>
        </div>

        <div class="kanban">
            <div class="column todo">
                <div class="column-header">
                    <div class="column-title">
                        <span class="column-icon">📝</span>
                        <span>待处理</span>
                    </div>
                    <span class="task-count" id="todoColumnCount">0</span>
                </div>
                <div id="todoTasks"></div>
            </div>
            <div class="column in-progress">
                <div class="column-header">
                    <div class="column-title">
                        <span class="column-icon">🚀</span>
                        <span>进行中</span>
                    </div>
                    <span class="task-count" id="progressColumnCount">0</span>
                </div>
                <div id="progressTasks"></div>
            </div>
            <div class="column review">
                <div class="column-header">
                    <div class="column-title">
                        <span class="column-icon">👀</span>
                        <span>审核中</span>
                    </div>
                    <span class="task-count" id="reviewColumnCount">0</span>
                </div>
                <div id="reviewTasks"></div>
            </div>
            <div class="column done">
                <div class="column-header">
                    <div class="column-title">
                        <span class="column-icon">✅</span>
                        <span>已完成</span>
                    </div>
                    <span class="task-count" id="doneColumnCount">0</span>
                </div>
                <div id="doneTasks"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="templateModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ 模板管理</h2>
                <button class="close-btn" onclick="closeModal('templateModal')">&times;</button>
            </div>
            <div class="add-task">
                <input type="text" id="templateName" placeholder="模板名称" />
                <div class="input-row">
                    <select id="templateCategory">
                        <option value="工作">分类：工作</option>
                        <option value="学习">分类：学习</option>
                        <option value="生活">分类：生活</option>
                        <option value="健康">分类：健康</option>
                    </select>
                    <select id="templateType" onchange="toggleTemplateType()">
                        <option value="single">单任务模板</option>
                        <option value="multi">统一模板（多任务）</option>
                    </select>
                </div>
                <div id="singleTaskSection">
                    <textarea id="templateContent" placeholder="模板内容描述..."></textarea>
                    <select id="templatePriority">
                        <option value="low">优先级：低</option>
                        <option value="medium" selected>优先级：中</option>
                        <option value="high">优先级：高</option>
                    </select>
                </div>
                <div id="multiTaskSection" style="display: none;">
                    <div id="subTasksList"></div>
                    <button type="button" class="btn-add-subtask" onclick="addSubTask()">+ 添加子任务</button>
                </div>
                <input type="hidden" id="editingTemplateId" value="" />
                <button onclick="saveTemplate()">💾 保存模板</button>
            </div>
            <div style="margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="color: #333; margin: 0;">现有模板</h3>
                    <div style="display: flex; gap: 8px;">
                        <button class="template-btn" style="padding: 6px 12px; font-size: 0.8rem;" onclick="selectAllTemplatesInModal()">📋 全选</button>
                        <button class="template-btn" style="padding: 6px 12px; font-size: 0.8rem; background: linear-gradient(135deg, #ff6b6b, #ee5a5a);" onclick="deleteSelectedTemplates()" id="deleteSelectedBtn" disabled>🗑️ 删除选中</button>
                    </div>
                </div>
                <div id="allTemplatesList"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="importModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📂 导入数据</h2>
                <button class="close-btn" onclick="closeModal('importModal')">&times;</button>
            </div>
            <p style="margin-bottom: 20px; color: #666;">选择要导入的 JSON 数据文件</p>
            <div class="file-input-wrapper">
                <button class="file-input-btn">📁 选择文件</button>
                <input type="file" id="importFile" accept=".json" onchange="importData(event)" />
            </div>
        </div>
    </div>

    <script>
        const defaultTemplates = [
            { id: 1, name: '日报', content: '编写今日工作日报，总结完成的工作和遇到的问题', category: '工作', priority: 'medium', icon: '📊', type: 'single' },
            { id: 2, name: '周会', content: '参加周会，汇报工作进展和下周计划', category: '工作', priority: 'high', icon: '📅', type: 'single' },
            { id: 3, name: '代码审查', content: '审查团队成员的代码，提出改进建议', category: '工作', priority: 'medium', icon: '🔍', type: 'single' },
            { id: 4, name: '阅读', content: '阅读技术书籍或文章，学习新知识', category: '学习', priority: 'low', icon: '📚', type: 'single' },
            { id: 5, name: '练习', content: '完成编程练习或在线课程作业', category: '学习', priority: 'medium', icon: '💻', type: 'single' },
            { id: 6, name: '购物', content: '购买生活用品和食材', category: '生活', priority: 'low', icon: '🛒', type: 'single' },
            { id: 7, name: '运动', content: '进行30分钟的体育锻炼', category: '健康', priority: 'medium', icon: '🏃', type: 'single' },
            { id: 8, name: '冥想', content: '进行10分钟冥想练习', category: '健康', priority: 'low', icon: '🧘', type: 'single' },
            { 
                id: 9, 
                name: '每日晨间例行', 
                category: '生活', 
                icon: '🌅', 
                type: 'multi',
                subTasks: [
                    { title: '起床喝水', content: '喝一杯温水', priority: 'high', category: '健康' },
                    { title: '晨间运动', content: '做10分钟拉伸运动', priority: 'medium', category: '健康' },
                    { title: '吃早餐', content: '营养均衡的早餐', priority: 'high', category: '生活' },
                    { title: '规划今日', content: '列出今天要完成的3件重要事情', priority: 'medium', category: '工作' }
                ]
            },
            { 
                id: 10, 
                name: '项目启动准备', 
                category: '工作', 
                icon: '🚀', 
                type: 'multi',
                subTasks: [
                    { title: '需求分析', content: '仔细阅读项目需求文档', priority: 'high', category: '工作' },
                    { title: '技术方案', content: '制定技术实现方案', priority: 'high', category: '工作' },
                    { title: '任务分解', content: '将项目分解为可执行的任务', priority: 'medium', category: '工作' },
                    { title: '团队会议', content: '与团队成员沟通启动事项', priority: 'medium', category: '工作' }
                ]
            }
        ];

        let tasks = JSON.parse(localStorage.getItem('dailyTasks')) || [];
        let templates = JSON.parse(localStorage.getItem('taskTemplates')) || defaultTemplates;
        let taskIdCounter = JSON.parse(localStorage.getItem('taskIdCounter')) || 1;
        let templateIdCounter = JSON.parse(localStorage.getItem('templateIdCounter')) || 100;
        let currentSubTasks = [];
        let isBatchMode = false;
        let selectedTemplateIds = new Set();
        let selectedTemplateIdsInModal = new Set();

        function updateDate() {
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                weekday: 'long' 
            };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', options);
        }

        function toggleBatchMode() {
            isBatchMode = !isBatchMode;
            selectedTemplateIds.clear();
            updateBatchUI();
            renderTemplates();
        }

        function updateBatchUI() {
            const batchBtn = document.getElementById('batchModeBtn');
            const batchActions = document.getElementById('batchActions');
            
            if (isBatchMode) {
                batchBtn.classList.add('active');
                batchBtn.textContent = '☑️ 取消批量';
                batchActions.classList.add('show');
            } else {
                batchBtn.classList.remove('active');
                batchBtn.textContent = '☑️ 批量选择';
                batchActions.classList.remove('show');
            }
            
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const countEl = document.getElementById('selectedCount');
            const addBtn = document.getElementById('batchAddBtn');
            countEl.textContent = `已选 ${selectedTemplateIds.size} 个模板`;
            addBtn.disabled = selectedTemplateIds.size === 0;
        }

        function selectAllTemplates() {
            const allTemplateIds = templates.map(t => t.id);
            const allSelected = allTemplateIds.every(id => selectedTemplateIds.has(id));
            
            if (allSelected) {
                selectedTemplateIds.clear();
            } else {
                allTemplateIds.forEach(id => selectedTemplateIds.add(id));
            }
            
            updateSelectedCount();
            renderTemplates();
        }

        function toggleTemplateSelection(templateId, event) {
            if (event) {
                event.stopPropagation();
            }
            
            if (selectedTemplateIds.has(templateId)) {
                selectedTemplateIds.delete(templateId);
            } else {
                selectedTemplateIds.add(templateId);
            }
            
            updateSelectedCount();
            renderTemplates();
        }

        function addSelectedTemplates() {
            if (selectedTemplateIds.size === 0) return;
            
            let totalTasks = 0;
            const now = new Date();
            
            selectedTemplateIds.forEach(templateId => {
                const template = templates.find(t => t.id === templateId);
                if (!template) return;
                
                if (template.type === 'multi' && template.subTasks && template.subTasks.length > 0) {
                    template.subTasks.forEach(subTask => {
                        tasks.push({
                            id: taskIdCounter++,
                            title: subTask.title,
                            content: subTask.content || '',
                            priority: subTask.priority || 'medium',
                            category: subTask.category || template.category,
                            status: 'todo',
                            addedTime: now.toLocaleString('zh-CN'),
                            dailyProgress: [],
                            completedDate: null
                        });
                        totalTasks++;
                    });
                } else {
                    tasks.push({
                        id: taskIdCounter++,
                        title: template.name,
                        content: template.content || '',
                        priority: template.priority || 'medium',
                        category: template.category || '工作',
                        status: 'todo',
                        addedTime: now.toLocaleString('zh-CN'),
                        dailyProgress: [],
                        completedDate: null
                    });
                    totalTasks++;
                }
            });
            
            saveData();
            renderTasks();
            
            selectedTemplateIds.clear();
            isBatchMode = false;
            updateBatchUI();
            renderTemplates();
            
            alert(`成功添加 ${totalTasks} 个任务！`);
        }

        function addTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const content = document.getElementById('taskContent').value.trim();
            const priority = document.getElementById('taskPriority').value;
            const category = document.getElementById('taskCategory').value;

            if (!title) {
                alert('请输入任务标题');
                return;
            }

            const now = new Date();
            const task = {
                id: taskIdCounter++,
                title: title,
                content: content,
                priority: priority,
                category: category,
                status: 'todo',
                addedTime: now.toLocaleString('zh-CN'),
                dailyProgress: [],
                completedDate: null
            };

            tasks.push(task);
            saveData();
            renderTasks();
            
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskContent').value = '';
        }

        function addTaskFromTemplate(templateId) {
            if (isBatchMode) return;
            
            const template = templates.find(t => t.id === templateId);
            if (!template) return;

            if (template.type === 'multi' && template.subTasks && template.subTasks.length > 0) {
                if (confirm(`此统一模板包含 ${template.subTasks.length} 个任务，确定一次性创建所有任务吗？`)) {
                    const now = new Date();
                    template.subTasks.forEach(subTask => {
                        tasks.push({
                            id: taskIdCounter++,
                            title: subTask.title,
                            content: subTask.content || '',
                            priority: subTask.priority || 'medium',
                            category: subTask.category || template.category,
                            status: 'todo',
                            addedTime: now.toLocaleString('zh-CN'),
                            dailyProgress: [],
                            completedDate: null
                        });
                    });
                    saveData();
                    renderTasks();
                }
            } else {
                document.getElementById('taskTitle').value = template.name;
                document.getElementById('taskContent').value = template.content || '';
                document.getElementById('taskPriority').value = template.priority || 'medium';
                document.getElementById('taskCategory').value = template.category || '工作';
            }
        }

        function moveTask(id, direction) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            const statusOrder = ['todo', 'in-progress', 'review', 'done'];
            const currentIndex = statusOrder.indexOf(task.status);

            if (direction === 'next' && currentIndex < statusOrder.length - 1) {
                task.status = statusOrder[currentIndex + 1];
                
                if (task.status === 'done') {
                    task.completedDate = new Date().toLocaleString('zh-CN');
                }
                
                task.dailyProgress.push({
                    date: new Date().toLocaleDateString('zh-CN'),
                    status: task.status,
                    time: new Date().toLocaleTimeString('zh-CN')
                });
            }

            saveData();
            renderTasks();
        }

        function deleteTask(id) {
            if (confirm('确定要删除这个任务吗？')) {
                tasks = tasks.filter(t => t.id !== id);
                saveData();
                renderTasks();
            }
        }

        function renderTaskCard(task) {
            const priorityLabels = { 'high': '高', 'medium': '中', 'low': '低' };
            const completedText = task.completedDate ? 
                `<span class="task-meta-item">✅ ${task.completedDate}</span>` : '';

            const progressText = task.dailyProgress.length > 0 ?
                `<span class="task-meta-item">📊 ${task.dailyProgress.length} 条记录</span>` : '';

            const nextButton = task.status !== 'done' ?
                `<button class="btn-next" onclick="moveTask(${task.id}, 'next')">→ 下一步</button>` : '';

            return `
                <div class="task-card ${task.status}">
                    <div class="task-header">
                        <div class="task-title">${task.title}</div>
                        <span class="priority-badge priority-${task.priority}">${priorityLabels[task.priority]}</span>
                    </div>
                    <div>
                        <span class="task-category">${task.category}</span>
                    </div>
                    ${task.content ? `<div class="task-content">${task.content}</div>` : ''}
                    <div class="task-meta">
                        <span class="task-meta-item">📅 ${task.addedTime}</span>
                        ${progressText}
                        ${completedText}
                    </div>
                    <div class="task-actions">
                        ${nextButton}
                        <button class="btn-delete" onclick="deleteTask(${task.id})">🗑️ 删除</button>
                    </div>
                </div>
            `;
        }

        function renderTasks() {
            const todoTasks = tasks.filter(t => t.status === 'todo');
            const progressTasks = tasks.filter(t => t.status === 'in-progress');
            const reviewTasks = tasks.filter(t => t.status === 'review');
            const doneTasks = tasks.filter(t => t.status === 'done');

            document.getElementById('todoTasks').innerHTML = todoTasks.length > 0 ? 
                todoTasks.map(renderTaskCard).join('') : 
                '<div class="empty-state"><div class="empty-state-icon">✨</div><div>暂无任务</div></div>';
            document.getElementById('progressTasks').innerHTML = progressTasks.length > 0 ? 
                progressTasks.map(renderTaskCard).join('') : 
                '<div class="empty-state"><div class="empty-state-icon">✨</div><div>暂无任务</div></div>';
            document.getElementById('reviewTasks').innerHTML = reviewTasks.length > 0 ? 
                reviewTasks.map(renderTaskCard).join('') : 
                '<div class="empty-state"><div class="empty-state-icon">✨</div><div>暂无任务</div></div>';
            document.getElementById('doneTasks').innerHTML = doneTasks.length > 0 ? 
                doneTasks.map(renderTaskCard).join('') : 
                '<div class="empty-state"><div class="empty-state-icon">🎉</div><div>暂无任务</div></div>';

            document.getElementById('totalCount').textContent = tasks.length;
            document.getElementById('todoCount').textContent = todoTasks.length;
            document.getElementById('progressCount').textContent = progressTasks.length;
            document.getElementById('doneCount').textContent = doneTasks.length;

            document.getElementById('todoColumnCount').textContent = todoTasks.length;
            document.getElementById('progressColumnCount').textContent = progressTasks.length;
            document.getElementById('reviewColumnCount').textContent = reviewTasks.length;
            document.getElementById('doneColumnCount').textContent = doneTasks.length;
        }

        function renderTemplates() {
            const categories = [...new Set(templates.map(t => t.category))];
            let html = '';

            categories.forEach(category => {
                const categoryTemplates = templates.filter(t => t.category === category);
                const icons = { '工作': '💼', '学习': '📚', '生活': '🏠', '健康': '💪' };
                
                html += `
                    <div class="template-category">
                        <div class="category-title">${icons[category] || '📌'} ${category}</div>
                        ${categoryTemplates.map(t => {
                            const isSelected = selectedTemplateIds.has(t.id);
                            return `
                            <div class="template-item ${isSelected ? 'selected' : ''}" 
                                 onclick="${isBatchMode ? `toggleTemplateSelection(${t.id})` : `addTaskFromTemplate(${t.id})`}">
                                <div class="template-checkbox-wrapper ${isBatchMode ? 'show' : ''}">
                                    <input type="checkbox" class="template-checkbox" 
                                           ${isSelected ? 'checked' : ''} 
                                           onclick="toggleTemplateSelection(${t.id}, event)" />
                                </div>
                                <span class="template-icon">${t.icon || '📄'}</span>
                                <div class="template-info">
                                    <div class="template-name">
                                        ${t.name}
                                        ${t.type === 'multi' ? `<span class="template-badge">${t.subTasks?.length || 0} 任务</span>` : ''}
                                    </div>
                                    <div class="template-desc">${t.type === 'multi' ? '点击一次性创建多个任务' : (t.content?.substring(0, 30) || '') + (t.content?.length > 30 ? '...' : '')}</div>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                `;
            });

            document.getElementById('templateList').innerHTML = html || '<div class="empty-state"><div class="empty-state-icon">📭</div><div>暂无模板</div></div>';
        }

        function renderAllTemplates() {
            let html = '';
            templates.forEach(t => {
                const isSelected = selectedTemplateIdsInModal.has(t.id);
                html += `
                    <div class="template-item ${isSelected ? 'selected' : ''}" style="cursor: default;">
                        <div class="template-checkbox-wrapper show">
                            <input type="checkbox" class="template-checkbox" 
                                   ${isSelected ? 'checked' : ''} 
                                   onclick="toggleTemplateSelectionInModal(${t.id}, event)" />
                        </div>
                        <span class="template-icon">${t.icon || '📄'}</span>
                        <div class="template-info">
                            <div class="template-name">
                                ${t.name}
                                ${t.type === 'multi' ? `<span class="template-badge">${t.subTasks?.length || 0} 任务</span>` : ''}
                            </div>
                            <div class="template-desc">${t.category} · ${t.type === 'multi' ? '统一模板' : '单任务'}</div>
                        </div>
                        <div class="template-actions">
                            <button class="template-action-btn edit" onclick="editTemplate(${t.id})">✏️</button>
                            <button class="template-action-btn delete" onclick="deleteTemplate(${t.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('allTemplatesList').innerHTML = html || '<div class="empty-state"><div class="empty-state-icon">📭</div><div>暂无模板</div></div>';
            updateDeleteSelectedBtn();
        }

        function toggleTemplateSelectionInModal(templateId, event) {
            if (event) {
                event.stopPropagation();
            }
            
            if (selectedTemplateIdsInModal.has(templateId)) {
                selectedTemplateIdsInModal.delete(templateId);
            } else {
                selectedTemplateIdsInModal.add(templateId);
            }
            
            updateDeleteSelectedBtn();
            renderAllTemplates();
        }

        function selectAllTemplatesInModal() {
            const allTemplateIds = templates.map(t => t.id);
            const allSelected = allTemplateIds.every(id => selectedTemplateIdsInModal.has(id));
            
            if (allSelected) {
                selectedTemplateIdsInModal.clear();
            } else {
                allTemplateIds.forEach(id => selectedTemplateIdsInModal.add(id));
            }
            
            updateDeleteSelectedBtn();
            renderAllTemplates();
        }

        function updateDeleteSelectedBtn() {
            const btn = document.getElementById('deleteSelectedBtn');
            if (btn) {
                btn.disabled = selectedTemplateIdsInModal.size === 0;
            }
        }

        function deleteSelectedTemplates() {
            if (selectedTemplateIdsInModal.size === 0) return;
            
            if (confirm(`确定要删除选中的 ${selectedTemplateIdsInModal.size} 个模板吗？此操作不可恢复！`)) {
                templates = templates.filter(t => !selectedTemplateIdsInModal.has(t.id));
                selectedTemplateIdsInModal.clear();
                saveData();
                renderTemplates();
                renderAllTemplates();
                alert('选中的模板已删除！');
            }
        }

        function toggleTemplateType() {
            const type = document.getElementById('templateType').value;
            if (type === 'multi') {
                document.getElementById('singleTaskSection').style.display = 'none';
                document.getElementById('multiTaskSection').style.display = 'block';
                currentSubTasks = [];
                renderSubTasks();
            } else {
                document.getElementById('singleTaskSection').style.display = 'block';
                document.getElementById('multiTaskSection').style.display = 'none';
            }
        }

        function addSubTask() {
            currentSubTasks.push({
                title: '',
                content: '',
                priority: 'medium',
                category: document.getElementById('templateCategory').value
            });
            renderSubTasks();
        }

        function removeSubTask(index) {
            currentSubTasks.splice(index, 1);
            renderSubTasks();
        }

        function renderSubTasks() {
            let html = '';
            currentSubTasks.forEach((subTask, index) => {
                html += `
                    <div class="sub-task-item">
                        <div class="sub-task-header">
                            <span class="sub-task-title">子任务 ${index + 1}</span>
                            <button type="button" class="btn-remove-subtask" onclick="removeSubTask(${index})">✕</button>
                        </div>
                        <input type="text" placeholder="子任务标题" value="${subTask.title}" onchange="currentSubTasks[${index}].title = this.value" style="margin-bottom: 8px;" />
                        <textarea placeholder="子任务内容" onchange="currentSubTasks[${index}].content = this.value" style="margin-bottom: 8px; min-height: 50px;">${subTask.content}</textarea>
                        <div class="input-row">
                            <select onchange="currentSubTasks[${index}].priority = this.value">
                                <option value="low" ${subTask.priority === 'low' ? 'selected' : ''}>优先级：低</option>
                                <option value="medium" ${subTask.priority === 'medium' ? 'selected' : ''}>优先级：中</option>
                                <option value="high" ${subTask.priority === 'high' ? 'selected' : ''}>优先级：高</option>
                            </select>
                            <select onchange="currentSubTasks[${index}].category = this.value">
                                <option value="工作" ${subTask.category === '工作' ? 'selected' : ''}>工作</option>
                                <option value="学习" ${subTask.category === '学习' ? 'selected' : ''}>学习</option>
                                <option value="生活" ${subTask.category === '生活' ? 'selected' : ''}>生活</option>
                                <option value="健康" ${subTask.category === '健康' ? 'selected' : ''}>健康</option>
                            </select>
                        </div>
                    </div>
                `;
            });
            document.getElementById('subTasksList').innerHTML = html;
        }

        function showTemplateModal() {
            document.getElementById('templateModal').classList.add('show');
            document.getElementById('templateName').value = '';
            document.getElementById('templateContent').value = '';
            document.getElementById('templateCategory').value = '工作';
            document.getElementById('templatePriority').value = 'medium';
            document.getElementById('templateType').value = 'single';
            document.getElementById('singleTaskSection').style.display = 'block';
            document.getElementById('multiTaskSection').style.display = 'none';
            document.getElementById('editingTemplateId').value = '';
            currentSubTasks = [];
            selectedTemplateIdsInModal.clear();
            renderAllTemplates();
        }

        function editTemplate(id) {
            const template = templates.find(t => t.id === id);
            if (!template) return;

            document.getElementById('templateName').value = template.name;
            document.getElementById('templateCategory').value = template.category;
            document.getElementById('templateType').value = template.type || 'single';
            document.getElementById('editingTemplateId').value = id;

            if (template.type === 'multi') {
                document.getElementById('singleTaskSection').style.display = 'none';
                document.getElementById('multiTaskSection').style.display = 'block';
                currentSubTasks = template.subTasks ? JSON.parse(JSON.stringify(template.subTasks)) : [];
                renderSubTasks();
            } else {
                document.getElementById('singleTaskSection').style.display = 'block';
                document.getElementById('multiTaskSection').style.display = 'none';
                document.getElementById('templateContent').value = template.content || '';
                document.getElementById('templatePriority').value = template.priority || 'medium';
            }
        }

        function saveTemplate() {
            const name = document.getElementById('templateName').value.trim();
            const category = document.getElementById('templateCategory').value;
            const type = document.getElementById('templateType').value;
            const editingId = document.getElementById('editingTemplateId').value;

            if (!name) {
                alert('请输入模板名称');
                return;
            }

            const icons = { '工作': '💼', '学习': '📚', '生活': '🏠', '健康': '💪' };

            if (editingId) {
                const template = templates.find(t => t.id === parseInt(editingId));
                if (template) {
                    template.name = name;
                    template.category = category;
                    template.type = type;
                    if (type === 'multi') {
                        template.subTasks = currentSubTasks.filter(st => st.title.trim());
                    } else {
                        template.content = document.getElementById('templateContent').value;
                        template.priority = document.getElementById('templatePriority').value;
                    }
                }
            } else {
                const newTemplate = {
                    id: templateIdCounter++,
                    name: name,
                    category: category,
                    type: type,
                    icon: icons[category] || '📄'
                };
                
                if (type === 'multi') {
                    newTemplate.subTasks = currentSubTasks.filter(st => st.title.trim());
                } else {
                    newTemplate.content = document.getElementById('templateContent').value;
                    newTemplate.priority = document.getElementById('templatePriority').value;
                }
                
                templates.push(newTemplate);
            }

            saveData();
            renderTemplates();
            renderAllTemplates();

            document.getElementById('templateName').value = '';
            document.getElementById('templateContent').value = '';
            document.getElementById('editingTemplateId').value = '';
            currentSubTasks = [];
        }

        function deleteTemplate(id) {
            if (confirm('确定要删除这个模板吗？')) {
                templates = templates.filter(t => t.id !== id);
                saveData();
                renderTemplates();
                renderAllTemplates();
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function showImportModal() {
            document.getElementById('importModal').classList.add('show');
        }

        function exportData() {
            const data = {
                tasks: tasks,
                templates: templates,
                taskIdCounter: taskIdCounter,
                templateIdCounter: templateIdCounter,
                exportDate: new Date().toLocaleString('zh-CN')
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const date = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `task-kanban-backup-${date}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (confirm('导入将覆盖现有数据，确定继续吗？')) {
                        if (data.tasks) tasks = data.tasks;
                        if (data.templates) templates = data.templates;
                        if (data.taskIdCounter) taskIdCounter = data.taskIdCounter;
                        if (data.templateIdCounter) templateIdCounter = data.templateIdCounter;
                        
                        saveData();
                        renderTasks();
                        renderTemplates();
                        closeModal('importModal');
                        alert('数据导入成功！');
                    }
                } catch (err) {
                    alert('文件格式错误，请选择有效的 JSON 文件');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function clearAllTasks() {
            if (tasks.length === 0) {
                alert('当前没有任务可清空！');
                return;
            }
            
            if (confirm(`确定要清空所有 ${tasks.length} 个任务吗？此操作不可恢复！`)) {
                tasks = [];
                saveData();
                renderTasks();
                alert('所有任务已清空！');
            }
        }

        function saveData() {
            localStorage.setItem('dailyTasks', JSON.stringify(tasks));
            localStorage.setItem('taskTemplates', JSON.stringify(templates));
            localStorage.setItem('taskIdCounter', taskIdCounter.toString());
            localStorage.setItem('templateIdCounter', templateIdCounter.toString());
        }

        updateDate();
        renderTasks();
        renderTemplates();

        document.getElementById('taskTitle').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('show');
                }
            });
        });
    </script>
</body>
</html>
